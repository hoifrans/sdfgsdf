<!DOCTYPE html>
<html>
<head>

<title>TaskTrack</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */

body{
margin:0;
font-family:Trebuchet MS, sans-serif;
color:white;
background:linear-gradient(135deg,#0b0014,#2b0040);
text-align:center;
transition:0.4s;
}

/* LIGHT MODE */

body.light{
background:#f0f3f8;
color:black;
}

/* PAGE ANIMATION */

.page{
display:none;
padding-top:60px;
animation:fade .6s;
}

.active{
display:block;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* BUTTON */

button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#a855ff;
color:white;
cursor:pointer;
font-weight:bold;
margin:5px;
transition:0.3s;
}

button:hover{
background:#9333ea;
transform:scale(1.08);
}

/* INPUT */

input{
padding:10px;
width:55%;
border-radius:5px;
border:none;
margin:5px;
}

/* TASK AREA */

.task-section{
width:80%;
margin:auto;
margin-top:20px;
}

/* TASK CARD */

.task{
background:rgba(255,255,255,0.1);
padding:12px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
border-radius:6px;
animation:taskPop .4s;
}

@keyframes taskPop{
from{transform:scale(.8); opacity:0;}
to{transform:scale(1); opacity:1;}
}

/* TASK STATUS */

.completed{
text-decoration:line-through;
color:#7CFFB2;
}

.late{
background:#7a0000;
}

/* UPDATE BUTTONS */

.edit{background:orange;}
.delete{background:red;}
.complete{background:green;}

.report{
background:rgba(255,255,255,0.1);
padding:15px;
margin-top:20px;
border-radius:6px;
}

/* THEME BUTTON */

.theme-toggle{
position:fixed;
top:15px;
right:20px;
font-size:22px;
cursor:pointer;
background:rgba(255,255,255,0.2);
padding:8px 12px;
border-radius:50px;
}

</style>
</head>

<body>

<div class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</div>

<!-- HOME -->

<div id="home" class="page active">

<h1>TaskTrack</h1>

<button onclick="showPage('menu')">Open</button>

</div>

<!-- MENU -->

<div id="menu" class="page">

<h2>Task Menu</h2>

<button onclick="showPage('addPage')">Add Task</button>

<button onclick="showPage('updatePage')">Update Task</button>

<button onclick="showPage('viewPage')">View Task</button>

<button onclick="showPage('home')">Back</button>

</div>

<!-- ADD TASK -->

<div id="addPage" class="page">

<h2>Add Task</h2>

<input id="taskInput" placeholder="Enter task">

<br>

<label>Deadline:</label>

<input type="date" id="taskDeadline">

<br>

<button onclick="addTask()">Add Task</button>

<br><br>

<button onclick="showPage('viewPage')">View Tasks</button>

<button onclick="showPage('updatePage')">Update Tasks</button>

<br><br>

<button onclick="showPage('menu')">Back</button>

</div>

<!-- UPDATE TASK -->

<div id="updatePage" class="page">

<h2>Update Tasks</h2>

<div id="updateList" class="task-section"></div>

<br>

<button onclick="showPage('viewPage')">View Tasks</button>

<button onclick="showPage('menu')">Back</button>

</div>

<!-- VIEW TASK -->

<div id="viewPage" class="page">

<h2>View Tasks</h2>

<input id="searchTask" placeholder="Search..." onkeyup="searchTasks()">

<div id="taskList" class="task-section"></div>

<div class="report">

<p>Total: <span id="total">0</span></p>

<p>Completed: <span id="completed">0</span></p>

<p>Pending: <span id="pending">0</span></p>

</div>

<button onclick="refreshTasks()">Refresh</button>

<button onclick="saveTasksToFile()">Save Tasks</button>

<br><br>

<button onclick="showPage('menu')">Back</button>

</div>

<script>

/* PAGE NAVIGATION */

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(page).classList.add("active")

displayTasks()
displayUpdate()

}

/* STORAGE */

let tasks = JSON.parse(localStorage.getItem("tasks")) || []

function saveTasks(){

localStorage.setItem("tasks",JSON.stringify(tasks))

}

/* ADD TASK */

function addTask(){

let text=document.getElementById("taskInput").value
let deadline=document.getElementById("taskDeadline").value

if(text==="") return

tasks.push({
text:text,
deadline:deadline,
done:false
})

document.getElementById("taskInput").value=""
document.getElementById("taskDeadline").value=""

saveTasks()

alert("Task Added")

}

/* VIEW TASKS */

function displayTasks(){

let list=document.getElementById("taskList")

if(!list) return

list.innerHTML=""

tasks.forEach((task,i)=>{

let div=document.createElement("div")

div.className="task"

let today=new Date().toISOString().split("T")[0]

if(task.deadline && task.deadline < today && !task.done){
div.classList.add("late")
}

let text=document.createElement("span")

text.innerHTML=task.text+"<br><small>Deadline: "+(task.deadline || "None")+"</small>"

if(task.done) text.classList.add("completed")

div.appendChild(text)

list.appendChild(div)

})

updateReport()

}

/* SEARCH */

function searchTasks(){

let keyword=document.getElementById("searchTask").value.toLowerCase()

let list=document.getElementById("taskList")

list.innerHTML=""

tasks.forEach((task,i)=>{

if(task.text.toLowerCase().includes(keyword)){

let div=document.createElement("div")

div.className="task"

div.innerText=task.text+" (Deadline: "+task.deadline+")"

list.appendChild(div)

}

})

}

/* UPDATE TASK */

function displayUpdate(){

let list=document.getElementById("updateList")

if(!list) return

list.innerHTML=""

tasks.forEach((task,i)=>{

let div=document.createElement("div")

div.className="task"

let text=document.createElement("span")

text.innerText=task.text

let complete=document.createElement("button")

complete.innerText="Complete"

complete.className="complete"

complete.onclick=function(){

tasks[i].done=true

saveTasks()

displayUpdate()

}

let edit=document.createElement("button")

edit.innerText="Edit"

edit.className="edit"

edit.onclick=function(){

let newTask=prompt("Edit Task",task.text)

if(newTask){

tasks[i].text=newTask

saveTasks()

displayUpdate()

}

}

let del=document.createElement("button")

del.innerText="Delete"

del.className="delete"

del.onclick=function(){

tasks.splice(i,1)

saveTasks()

displayUpdate()

}

div.appendChild(text)
div.appendChild(complete)
div.appendChild(edit)
div.appendChild(del)

list.appendChild(div)

})

}

/* REPORT */

function updateReport(){

let total=tasks.length

let completed=tasks.filter(t=>t.done).length

let pending=total-completed

document.getElementById("total").innerText=total
document.getElementById("completed").innerText=completed
document.getElementById("pending").innerText=pending

}

/* REFRESH */

function refreshTasks(){

displayTasks()

}

/* EXPORT */

function saveTasksToFile(){

let content="TaskTrack Report\n\n"

tasks.forEach((task,i)=>{

let status=task.done?"Completed":"Pending"

content+=(i+1)+". "+task.text+" - "+status+" Deadline:"+task.deadline+"\n"

})

let blob=new Blob([content])

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="tasks.txt"

link.click()

}

/* THEME */

function toggleTheme(){

document.body.classList.toggle("light")

let icon=document.getElementById("themeIcon")

if(document.body.classList.contains("light")){
icon.innerHTML="☀️"
}else{
icon.innerHTML="🌙"
}

}

</script>

</body>
</html>

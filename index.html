<!DOCTYPE html>
<html>
<head>
<title>TaskTrack</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Trebuchet MS;
color:white;
text-align:center;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
background-size:400% 400%;
animation:bgMove 12s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

.glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.2);
border-radius:14px;
box-shadow:0 8px 32px rgba(0,0,0,0.4);
padding:20px;
margin:20px auto;
width:90%;
max-width:420px;
}

.page{
display:none;
padding-top:60px;
animation:fade .5s;
}

.active{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
color:white;
background:linear-gradient(135deg,#a855ff,#9333ea);
margin:6px;
}

button:hover{
transform:scale(1.08);
}

input{
padding:10px;
width:80%;
border:none;
border-radius:8px;
margin:6px;
background:rgba(255,255,255,0.15);
color:white;
}

.task{
background:rgba(255,255,255,0.1);
padding:12px;
margin-top:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.completed{
text-decoration:line-through;
color:#7CFFB2;
}

.countdown{
font-size:12px;
opacity:.8;
}

.notification{
background:rgba(255,0,0,0.3);
padding:10px;
margin-top:10px;
border-radius:8px;
cursor:pointer;
}

.slide{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:absolute;
opacity:0;
transform:scale(.9);
transition:.5s;
}

.slide.active{
opacity:1;
transform:scale(1);
}

.progress{
position:fixed;
top:0;
left:0;
height:5px;
background:#a855ff;
width:0%;
}

.nav{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
}

</style>
</head>

<body>

<!-- HOME -->

<div id="home" class="page active">

<div class="glass">

<h1>TaskTrack</h1>

<button onclick="openApp()">Open</button>

<button onclick="showTutorial()">Tutorial</button>

<div id="notificationPanel"></div>

</div>

</div>

<!-- MENU -->

<div id="menu" class="page">

<div class="glass">

<h2>Menu</h2>

<button onclick="showPage('addPage')">Add Task</button>

<button onclick="showPage('updatePage')">Update Task</button>

<button onclick="showPage('viewPage')">View Tasks</button>

<button onclick="showPage('home')">Back</button>

</div>

</div>

<!-- ADD TASK -->

<div id="addPage" class="page">

<div class="glass">

<h2>Add Task</h2>

<input id="taskInput" placeholder="Enter task">

<br>

<input type="date" id="taskDeadline">

<br>

<input type="time" id="taskTime">

<br><br>

<button onclick="addTask()">Add Task</button>

<button onclick="showPage('viewPage')">View Tasks</button>

<br><br>

<button onclick="showPage('menu')">Back</button>

</div>

</div>

<!-- UPDATE -->

<div id="updatePage" class="page">

<div class="glass">

<h2>Update Tasks</h2>

<div id="updateList"></div>

<button onclick="showPage('menu')">Back</button>

</div>

</div>

<!-- VIEW -->

<div id="viewPage" class="page">

<div class="glass">

<h2>Tasks</h2>

<div id="taskList"></div>

<button onclick="refreshTasks()">Refresh</button>

<button onclick="showPage('menu')">Back</button>

</div>

</div>

<!-- TUTORIAL -->

<div id="tutorial" class="page">

<div class="progress" id="progress"></div>

<div class="slide active">
<h1>Welcome</h1>
<p>This tutorial will guide you.</p>
</div>

<div class="slide">
<h1>Step 1</h1>
<p>Press Open to start the app.</p>
</div>

<div class="slide">
<h1>Step 2</h1>
<p>Add tasks with deadlines.</p>
</div>

<div class="slide">
<h1>Step 3</h1>
<p>Update tasks to complete them.</p>
</div>

<div class="slide">
<h1>Step 4</h1>
<p>View and monitor your tasks.</p>
</div>

<div class="nav">
<button onclick="prevSlide()">Prev</button>
<button onclick="nextSlide()">Next</button>
<button onclick="exitTutorial()">Exit</button>
</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || []
let notifications=[]

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks))
}

function showPage(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(page).classList.add("active")
displayTasks()
displayUpdate()
}

function addTask(){

let text=document.getElementById("taskInput").value
let deadline=document.getElementById("taskDeadline").value
let time=document.getElementById("taskTime").value

if(text==="") return

tasks.push({
text:text,
deadline:deadline,
time:time,
done:false
})

saveTasks()

alert("Task added")

document.getElementById("taskInput").value=""
document.getElementById("taskDeadline").value=""
document.getElementById("taskTime").value=""

showPage("viewPage")

}

function displayUpdate(){

let list=document.getElementById("updateList")
if(!list) return

list.innerHTML=""

tasks.forEach((task,i)=>{

if(task.done) return

let div=document.createElement("div")
div.className="task"

let text=document.createElement("span")
text.innerText=task.text

let complete=document.createElement("button")
complete.innerText="Complete"

complete.onclick=function(){

tasks[i].done=true
saveTasks()
displayUpdate()
displayTasks()

}

let edit=document.createElement("button")
edit.innerText="Edit"

edit.onclick=function(){

let newTask=prompt("Edit",task.text)

if(newTask){
tasks[i].text=newTask
saveTasks()
displayUpdate()
displayTasks()
}

}

div.appendChild(text)
div.appendChild(complete)
div.appendChild(edit)

list.appendChild(div)

})

}

function displayTasks(){

let list=document.getElementById("taskList")
if(!list) return

list.innerHTML=""

tasks.forEach(task=>{

let div=document.createElement("div")
div.className="task"

let text=document.createElement("div")

let due=new Date(task.deadline+"T"+task.time)

text.innerHTML=
task.text+
"<br><small>"+task.deadline+" "+task.time+"</small>"+
"<div class='countdown' data-due='"+due.toISOString()+"'></div>"

if(task.done) text.classList.add("completed")

div.appendChild(text)

list.appendChild(div)

})

updateCountdowns()

}

function refreshTasks(){
displayTasks()
}

function updateCountdowns(){

document.querySelectorAll(".countdown").forEach(c=>{

let due=new Date(c.dataset.due)
let now=new Date()

let diff=due-now

if(diff<=0){
c.innerText="Expired"
return
}

let h=Math.floor(diff/3600000)
let m=Math.floor((diff%3600000)/60000)

c.innerText="Time left: "+h+"h "+m+"m"

})

}

setInterval(updateCountdowns,60000)

function checkReminders(){

notifications=[]

let now=new Date()

tasks.forEach(task=>{

if(task.done) return
if(!task.deadline||!task.time) return

let due=new Date(task.deadline+"T"+task.time)
let diff=(due-now)/3600000

if(diff<=12 && diff>6) notifications.push({task:task,msg:"12 hours remaining"})
if(diff<=6 && diff>3) notifications.push({task:task,msg:"6 hours remaining"})
if(diff<=3 && diff>0) notifications.push({task:task,msg:"3 hours remaining"})
if(diff<=0) notifications.push({task:task,msg:"Missed deadline"})

})

}

function showNotifications(){

let panel=document.getElementById("notificationPanel")
panel.innerHTML=""

notifications.forEach(n=>{

let div=document.createElement("div")
div.className="notification"

div.innerHTML="<b>"+n.msg+"</b><br>"+n.task.text

div.onclick=function(){
showPage("updatePage")
}

panel.appendChild(div)

})

}

function openApp(){

checkReminders()
showNotifications()
showPage("menu")

}

/* tutorial */

let slides
let progress
let index=0

function showTutorial(){

showPage("tutorial")

slides=document.querySelectorAll(".slide")
progress=document.getElementById("progress")

index=0

showSlide()

}

function showSlide(){

slides.forEach(s=>s.classList.remove("active"))

slides[index].classList.add("active")

let percent=(index/(slides.length-1))*100
progress.style.width=percent+"%"

}

function nextSlide(){
if(index<slides.length-1){
index++
showSlide()
}
}

function prevSlide(){
if(index>0){
index--
showSlide()
}
}

function exitTutorial(){
showPage("home")
}

displayTasks()
displayUpdate()

</script>

</body>
</html>
